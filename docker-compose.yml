version: "3.8"

services:
  api:
    build: ./scheduler-api
    container_name: scheduler-api
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    restart: always

  client:
    build: ./client
    container_name: scheduler-client
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: always